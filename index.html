<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotogallery Lyon 2026 – Upload</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
</head>
<body class="bg-blue-50 flex items-center justify-center min-h-screen p-4 font-sans text-slate-800">
    <div class="absolute top-10 left-10 text-6xl opacity-20 transform -rotate-12 hidden md:block">🥐</div>
    <div class="absolute bottom-20 right-10 text-6xl opacity-20 transform rotate-12 hidden md:block">🦁</div>
    <div class="absolute top-20 right-20 text-6xl opacity-20 transform rotate-6 hidden md:block">🇫🇷</div>
    <div class="absolute bottom-10 left-20 text-6xl opacity-20 transform -rotate-6 hidden md:block">📸</div>

    <div class="bg-white p-8 sm:p-10 rounded-3xl shadow-2xl max-w-md w-full text-center border-t-8 border-blue-600 relative z-10">
        <div class="text-5xl mb-4">📸 🚌 🇫🇷</div>
        <h1 class="text-3xl sm:text-4xl font-extrabold text-blue-900 mb-2">Fotogallery Lyon 2026</h1>
        <p class="text-slate-600 font-medium mb-8">Lade deine besten Momente direkt vom Handy hoch!</p>

        <!-- Flash messages -->
        <div id="flash-message" class="mb-6 text-emerald-900 bg-emerald-100 p-4 rounded-xl font-bold border-2 border-emerald-200 text-sm hidden"></div>
        <div id="error-message" class="mb-6 text-red-900 bg-red-100 p-4 rounded-xl font-bold border-2 border-red-200 text-sm hidden"></div>

        <form id="upload-form" class="space-y-6">
            <div class="flex items-center justify-center w-full">
                <label for="dropzone-file" class="flex flex-col items-center justify-center w-full min-h-[12rem] border-4 border-dashed border-blue-300 rounded-2xl cursor-pointer bg-blue-50 hover:bg-blue-100 transition duration-300 p-6 relative overflow-hidden">
                    <!-- Default content -->
                    <div id="dropzone-content" class="flex flex-col items-center justify-center pt-5 pb-6">
                        <div class="text-4xl mb-3 text-blue-600 animate-bounce">📱</div>
                        <p id="file-name-label" class="mb-2 text-xl text-blue-800 font-extrabold text-center">Foto auswählen oder aufnehmen 📸</p>
                        <p class="text-xs text-blue-500 font-medium">Unterstützt alle Bildformate</p>
                    </div>
                    <!-- Image preview container -->
                    <div id="preview-container" class="hidden w-full flex flex-col items-center justify-center space-y-2 py-2">
                        <img id="preview-img" class="h-28 max-w-full object-contain rounded-xl shadow-md border-2 border-emerald-500" src="" alt="Vorschau" />
                        <p id="preview-file-name" class="text-sm font-extrabold text-emerald-800 text-center px-2"></p>
                    </div>
                    <input id="dropzone-file" type="file" class="hidden" accept="image/*" />
                </label>
            </div>

            <button type="submit" id="upload-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-extrabold text-xl py-4 px-4 rounded-2xl transition duration-300 shadow-[0_4px_0_rgb(29,78,216)] hover:shadow-[0_2px_0_rgb(29,78,216)] hover:translate-y-[2px]">
                Hochladen 🚀
            </button>

            <!-- Spinner -->
            <div id="upload-spinner" class="hidden flex flex-col items-center space-y-2">
                <div class="w-8 h-8 rounded-full border-4 border-blue-600 border-t-transparent animate-spin"></div>
                <p class="text-sm text-blue-600 font-medium">Wird hochgeladen...</p>
            </div>
        </form>

        <div class="mt-8 text-sm text-slate-400">
            <a href="gallery.html" class="underline hover:text-blue-600">Zur Fotogalerie</a> | <a href="admin.html" class="underline hover:text-blue-600">Admin-Bereich</a>
        </div>
    </div>

    <script>
        // ── Supabase Setup ──
        const SUPABASE_URL = 'https://jxharfhlbhwnlnmfcxci.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_NDKQOgvLAdLEFDl7A0A99A_T1T8nfSp';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const BUCKET = 'lyon-photos';

        // ── File selection & Preview (Runs immediately, independent of Supabase) ──
        document.getElementById('dropzone-file').addEventListener('change', async function(e) {
            const fileInput = document.getElementById('dropzone-file');
            const labelText = document.getElementById('file-name-label');
            const dropzoneContent = document.getElementById('dropzone-content');
            const previewContainer = document.getElementById('preview-container');
            const previewImg = document.getElementById('preview-img');
            const previewFileName = document.getElementById('preview-file-name');

            if (e.target.files.length > 0) {
                let file = e.target.files[0];
                
                // Show HEIC conversion loader if applicable
                if (file.name.toLowerCase().endsWith('.heic') || file.name.toLowerCase().endsWith('.heif')) {
                    labelText.textContent = "iPhone-Foto (HEIC) wird optimiert... ⏳";
                    labelText.className = "mb-2 text-xl text-amber-600 font-extrabold animate-pulse text-center";
                    
                    try {
                        if (typeof heic2any !== 'undefined') {
                            const jpegBlob = await heic2any({
                                blob: file,
                                toType: "image/jpeg",
                                quality: 0.8
                            });
                            
                            const newName = file.name.replace(/\.(heic|heif)$/i, '.jpg');
                            file = new File([jpegBlob], newName, { type: "image/jpeg" });
                            
                            // Re-assign converted file to the input
                            const dataTransfer = new DataTransfer();
                            dataTransfer.items.add(file);
                            fileInput.files = dataTransfer.files;
                        } else {
                            console.warn("heic2any NOT loaded, using raw file.");
                        }
                    } catch (err) {
                        console.error("HEIC conversion failed:", err);
                    }
                }

                // Show thumbnail image preview
                const reader = new FileReader();
                reader.onload = function(event) {
                    previewImg.src = event.target.result;
                    previewFileName.textContent = `Bereit: ${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB) ✅`;
                    previewContainer.classList.remove('hidden');
                    dropzoneContent.classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        });

        // ── Upload logic ──
        document.getElementById('upload-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const fileInput = document.getElementById('dropzone-file');
            const flashMsg = document.getElementById('flash-message');
            const errorMsg = document.getElementById('error-message');
            const spinner = document.getElementById('upload-spinner');
            const uploadBtn = document.getElementById('upload-btn');
            const dropzoneContent = document.getElementById('dropzone-content');
            const previewContainer = document.getElementById('preview-container');
            const previewImg = document.getElementById('preview-img');

            flashMsg.classList.add('hidden');
            errorMsg.classList.add('hidden');

            if (!fileInput.files || fileInput.files.length === 0) {
                errorMsg.textContent = 'Kein Foto ausgewählt!';
                errorMsg.classList.remove('hidden');
                return;
            }

            const file = fileInput.files[0];
            console.log('Upload starting - File:', file.name, 'Type:', file.type, 'Size:', file.size);

            // Accept all image types (including HEIC from iPhones, which are now converted to JPEG anyway)
            if (!file.type.startsWith('image/') && file.type !== '') {
                const msg = 'Ungültiger Dateityp (' + file.type + ')! Bitte wähle ein Bild.';
                errorMsg.textContent = msg;
                errorMsg.classList.remove('hidden');
                alert(msg);
                return;
            }

            // Generate unique filename
            const timestamp = Date.now();
            const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
            const filePath = `${timestamp}_${safeName}`;

            // Show spinner, hide button
            spinner.classList.remove('hidden');
            uploadBtn.classList.add('hidden');

            try {
                console.log('Uploading to Supabase:', filePath);
                const { data, error } = await supabase.storage
                    .from(BUCKET)
                    .upload(filePath, file, {
                        cacheControl: '3600',
                        upsert: false
                    });

                console.log('Upload result - Data:', data, 'Error:', error);

                if (error) throw error;

                flashMsg.textContent = 'Foto erfolgreich hochgeladen! 🎉';
                flashMsg.classList.remove('hidden');
                alert('✅ Foto erfolgreich hochgeladen!');

                // Reset form
                fileInput.value = '';
                previewContainer.classList.add('hidden');
                previewImg.src = '';
                dropzoneContent.classList.remove('hidden');
                
                const labelText = document.getElementById('file-name-label');
                labelText.textContent = 'Foto auswählen oder aufnehmen 📸';
                labelText.className = "mb-2 text-xl text-blue-800 font-extrabold text-center";

            } catch (err) {
                console.error('Upload error:', err);
                const errMsg = 'Fehler beim Hochladen: ' + (err.message || err.statusCode || JSON.stringify(err));
                errorMsg.textContent = errMsg;
                errorMsg.classList.remove('hidden');
                alert(errMsg);
            } finally {
                spinner.classList.add('hidden');
                uploadBtn.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
